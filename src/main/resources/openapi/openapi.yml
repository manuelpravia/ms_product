openapi: 3.0.3
info:
  title: microservice for Product management - OpenAPI 3.0
  description: |-
    This microservice is designed for product management and belongs to the BODGEN microservices group which implements systems for warehouse management.
  version: 1.0.0

tags:
  - name: product
    description: Operations about product
  - name: category
    description: Operations about product categories

paths:
  # --- ENDPOINTS DE PRODUCTOS ---
  /product:
    post:
      tags: [product]
      summary: Add new product
      operationId: addProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        "201":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        "405":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags: [product]
      summary: Consult the list of products
      operationId: listProducts
      parameters:
        - name: page
          in: query
          description: Page number (starting from 0)
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Number of records per page
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'
        "404":
          description: No products found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /product/codes:
    post:
      tags: [product]
      summary: Get products by code
      operationId: getProductsByCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCodesRequest'
      responses:
        "201":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
        "405":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /product/{id}:
    get:
      tags: [product]
      summary: Search for a product by identifier
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
    put:
      tags: [product]
      summary: Update product data
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        "200":
          description: Successful operation
    delete:
      tags: [product]
      summary: Delete a product
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Product deleted

  # --- NUEVOS ENDPOINTS DE CATEGORÍAS ---
  /category:
    get:
      tags: [category]
      summary: List all categories
      operationId: listCategories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
    post:
      tags: [category]
      summary: Create a new category
      operationId: addCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'

  /category/{id}:
    get:
      tags: [category]
      summary: Get category by ID
      operationId: getCategoryById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
    put:
      tags: [category]
      summary: Update a category
      operationId: updateCategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        "200":
          description: Category updated

components:
  schemas:
    # --- PRODUCT SCHEMAS ---
    ProductRequest:
      required: [name, description, price, presentation, categoryId]
      type: object
      properties:
        name:
          type: string
          example: Agua Cielo
        description:
          type: string
          example: Agua de mesa sin gas
        price:
          type: number
          format: double
          example: 2.60
        stock:
          type: integer
          format: int32
          example: 40
        categoryId:
          type: integer
          format: int64
          example: 1
        code:
          type: string
          example: "524ASF"
        presentation:
          type: string
          example: Unit
        imageUrl:
          type: string
          example: http://localhost:8080/img/avena.jpg

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        createDate:
          type: string
          format: date-time
        changeDate:
          type: string
          format: date-time
        stock:
          type: integer
        categoryId:
          type: integer
        code:
          type: string
        presentation:
          type: string
        imageUrl:
          type: string

    ProductPageResponse:
      type: object
      properties:
        totalCount:
          type: integer
          format: int64
          description: Total number of items in the database
          example: 100
        totalPages:
          type: integer
          description: Total number of pages
          example: 10
        pageIndex:
          type: integer
          description: Current page index
          example: 0
        pageSize:
          type: integer
          description: Number of items per page
          example: 10
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
      description: Paginated response for products

    # --- NUEVOS CATEGORY SCHEMAS ---
    CategoryRequest:
      required: [name]
      type: object
      properties:
        name:
          type: string
          example: Bebidas
        description:
          type: string
          example: Todo tipo de líquidos y refrescos

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Bebidas
        description:
          type: string
          example: Todo tipo de líquidos y refrescos
        createDate:
          type: string
          format: date-time
        changeDate:
          type: string
          format: date-time
    ProductCodesRequest:
      type: object
      properties:
        codes:
          type: array
          items:
            type: string
    Error:
      type: object
      properties:
        code:
          type: string
        status:
          type: integer
          format: int32
        message:
          type: string